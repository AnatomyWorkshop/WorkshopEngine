basePath: /api
definitions:
  internal_engine_api.CreateMemoryReq:
    properties:
      content:
        type: string
      importance:
        description: 0–1，默认 0.9
        type: number
      stage_tags:
        description: 阶段标签（空 = 无阶段限制）
        items:
          type: string
        type: array
      type:
        description: fact | summary | open_loop，默认 fact
        type: string
    required:
    - content
    type: object
  internal_engine_api.ForkSessionReq:
    properties:
      from_floor_seq:
        description: |-
          复制到哪个楼层序号（含）。
          nil = 复制全部已提交楼层；0 = 不复制任何楼层（空历史分叉，相当于同模板新会话）。
        type: integer
      user_id:
        description: 可选：覆盖新 session 的用户 ID
        type: string
    type: object
  internal_engine_api.GenParams:
    properties:
      frequency_penalty:
        type: number
      max_tokens:
        type: integer
      presence_penalty:
        type: number
      reasoning_effort:
        description: '"low"|"medium"|"high"'
        type: string
      stop:
        items:
          type: string
        type: array
      temperature:
        type: number
      top_k:
        type: integer
      top_p:
        type: number
    type: object
  internal_engine_api.ThchatBranch:
    properties:
      branch_id:
        type: string
      id:
        type: string
      origin_seq:
        type: integer
      parent_branch:
        type: string
    type: object
  internal_engine_api.ThchatEdge:
    properties:
      from_id:
        type: string
      id:
        type: string
      relation:
        type: string
      to_id:
        type: string
    type: object
  internal_engine_api.ThchatExport:
    properties:
      branches:
        items:
          $ref: '#/definitions/internal_engine_api.ThchatBranch'
        type: array
      exported_at:
        type: string
      floors:
        items:
          $ref: '#/definitions/internal_engine_api.ThchatFloor'
        type: array
      format:
        type: string
      game_id:
        type: string
      game_title:
        type: string
      memories:
        items:
          $ref: '#/definitions/internal_engine_api.ThchatMemory'
        type: array
      memory_edges:
        items:
          $ref: '#/definitions/internal_engine_api.ThchatEdge'
        type: array
      session:
        $ref: '#/definitions/internal_engine_api.ThchatSession'
      version:
        type: string
    type: object
  internal_engine_api.ThchatFloor:
    properties:
      branch_id:
        type: string
      id:
        type: string
      pages:
        items:
          $ref: '#/definitions/internal_engine_api.ThchatPage'
        type: array
      seq:
        type: integer
      status:
        type: string
    type: object
  internal_engine_api.ThchatMemory:
    properties:
      content:
        type: string
      deprecated:
        type: boolean
      fact_key:
        type: string
      id:
        type: string
      importance:
        type: number
      source_floor:
        type: integer
      stage_tags:
        items:
          type: integer
        type: array
      type:
        type: string
    type: object
  internal_engine_api.ThchatPage:
    properties:
      id:
        type: string
      is_active:
        type: boolean
      messages:
        items:
          type: integer
        type: array
      page_vars:
        items:
          type: integer
        type: array
      token_used:
        type: integer
    type: object
  internal_engine_api.ThchatSession:
    properties:
      character_card_id:
        type: string
      character_snapshot:
        items:
          type: integer
        type: array
      created_at:
        type: string
      floor_count:
        type: integer
      id:
        type: string
      memory_summary:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variables:
        items:
          type: integer
        type: array
    type: object
  internal_engine_api.TurnRequest:
    properties:
      api_key:
        description: 可选：用户自定义 AI 配置（覆盖服务器默认 Key）
        type: string
      base_url:
        type: string
      branch_id:
        description: 可选：分支 ID（空 = "main"，P-3G）
        type: string
      generation_params:
        allOf:
        - $ref: '#/definitions/internal_engine_api.GenParams'
        description: |-
          可选：本轮生成参数覆盖（最高优先级，覆盖 profile 和 env 配置）
          对齐 TH TurnRequest.generation_params 字段
      is_regen:
        description: 重新生成（Swipe）
        type: boolean
      model:
        type: string
      session_id:
        type: string
      user_input:
        type: string
    type: object
  internal_engine_api.UpdateSessionReq:
    properties:
      is_public:
        description: 指针类型：nil = 不修改，false/true = 明确设置
        type: boolean
      status:
        description: active | archived
        type: string
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: AI 文字游戏引擎 — 游玩、创作、社交全栈 API
  title: WorkshopEngine API
  version: "1.0"
paths:
  /assets/{slug}/upload:
    post:
      consumes:
      - multipart/form-data
      description: 上传图片/音频文件到指定游戏 slug 目录（最大 10MB）
      parameters:
      - description: 游戏 slug
        in: path
        name: slug
        required: true
        type: string
      - description: 素材文件（png/jpg/gif/webp/mp3/ogg/wav）
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: url + filename + size + mime
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "415":
          description: 不支持的文件类型
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 上传素材文件
      tags:
      - assets
  /auth/token:
    post:
      consumes:
      - application/json
      description: 使用 admin_key 验证后签发 JWT Bearer token
      parameters:
      - description: 签发请求
        in: body
        name: body
        required: true
        schema:
          properties:
            account_id:
              type: string
            admin_key:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: token + expires_in_hours
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 签发 JWT Token
      tags:
      - auth
  /create/cards:
    get:
      description: 获取公开角色卡列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 角色卡列表
      tags:
      - creation-cards
  /create/cards/{slug}:
    delete:
      description: 根据 slug 删除角色卡
      parameters:
      - description: 角色卡 slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除角色卡
      tags:
      - creation-cards
    get:
      description: 根据 slug 获取角色卡详情
      parameters:
      - description: 角色卡 slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 角色卡详情
      tags:
      - creation-cards
    patch:
      consumes:
      - application/json
      description: 部分更新角色卡字段
      parameters:
      - description: 角色卡 slug
        in: path
        name: slug
        required: true
        type: string
      - description: 更新字段
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新角色卡字段
      tags:
      - creation-cards
  /create/cards/import:
    post:
      consumes:
      - multipart/form-data
      description: 上传角色卡 PNG 文件，解析内嵌数据并导入
      parameters:
      - description: 角色卡 PNG 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 导入角色卡 PNG
      tags:
      - creation-cards
  /create/games/{id}/comment-config:
    get:
      description: 获取游戏的评论区配置（default_mode 等）
      parameters:
      - description: 游戏 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取评论配置
      tags:
      - social-comments
    patch:
      consumes:
      - application/json
      description: 更新游戏的评论区配置
      parameters:
      - description: 游戏 ID
        in: path
        name: id
        required: true
        type: string
      - description: 配置
        in: body
        name: body
        required: true
        schema:
          properties:
            default_mode:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新评论配置
      tags:
      - social-comments
  /create/llm-profiles:
    get:
      description: 列出当前账户的 LLM 配置
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: LLM 配置列表
      tags:
      - creation-llm
    post:
      consumes:
      - application/json
      description: 创建新的 LLM 配置（含加密 API Key）
      parameters:
      - description: name, provider, model_id, base_url, api_key, params
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建 LLM 配置
      tags:
      - creation-llm
  /create/llm-profiles/{id}:
    delete:
      description: 将 LLM 配置标记为 deleted
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 软删除 LLM 配置
      tags:
      - creation-llm
    get:
      description: 根据 ID 获取 LLM 配置详情
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取单个 LLM 配置
      tags:
      - creation-llm
    patch:
      consumes:
      - application/json
      description: 部分更新 LLM 配置字段
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新字段
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新 LLM 配置
      tags:
      - creation-llm
  /create/llm-profiles/{id}/activate:
    post:
      consumes:
      - application/json
      description: 将 LLM 配置绑定到指定 scope/slot
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: string
      - description: scope, scope_id, slot, params
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 绑定配置到作用域
      tags:
      - creation-llm
  /create/llm-profiles/models/discover:
    post:
      consumes:
      - application/json
      description: 拉取指定 Provider 的可用模型列表
      parameters:
      - description: base_url, api_key
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发现可用模型
      tags:
      - creation-llm
  /create/llm-profiles/models/test:
    post:
      consumes:
      - application/json
      description: 向指定 Provider 发送探测消息，返回时延和响应片段
      parameters:
      - description: base_url, api_key, model
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 测试 LLM 连接
      tags:
      - creation-llm
  /create/regex-profiles/{pid}/rules:
    get:
      description: 列出配置下的正则规则
      parameters:
      - description: 配置 ID
        in: path
        name: pid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 正则规则列表
      tags:
      - creation-regex
    post:
      consumes:
      - application/json
      description: 新建正则替换规则
      parameters:
      - description: 配置 ID
        in: path
        name: pid
        required: true
        type: string
      - description: pattern, replacement, apply_to, order, enabled
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建正则规则
      tags:
      - creation-regex
  /create/regex-profiles/{pid}/rules/{rid}:
    delete:
      description: 删除指定正则规则
      parameters:
      - description: 配置 ID
        in: path
        name: pid
        required: true
        type: string
      - description: 规则 ID
        in: path
        name: rid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除正则规则
      tags:
      - creation-regex
    patch:
      consumes:
      - application/json
      description: 部分更新正则规则
      parameters:
      - description: 配置 ID
        in: path
        name: pid
        required: true
        type: string
      - description: 规则 ID
        in: path
        name: rid
        required: true
        type: string
      - description: 更新字段
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新正则规则
      tags:
      - creation-regex
  /create/regex-profiles/{pid}/rules/reorder:
    put:
      consumes:
      - application/json
      description: 批量更新规则 order
      parameters:
      - description: 配置 ID
        in: path
        name: pid
        required: true
        type: string
      - description: '[{id, order}]'
        in: body
        name: body
        required: true
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 批量调整规则顺序
      tags:
      - creation-regex
  /create/templates:
