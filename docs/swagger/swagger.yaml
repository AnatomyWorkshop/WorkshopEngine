  /create/templates/{id}/lorebook:
    get:
      description: 获取指定游戏的世界书词条
      parameters:
      - description: 游戏模板 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 世界书词条列表
      tags:
      - creation-lorebook
    post:
      consumes:
      - application/json
      description: 创建或更新世界书词条
      parameters:
      - description: 游戏模板 ID
        in: path
        name: id
        required: true
        type: string
      - description: WorldbookEntry
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 新增/更新世界书词条
      tags:
      - creation-lorebook
  /create/templates/{id}/lorebook/{eid}:
    delete:
      description: 删除指定世界书词条
      parameters:
      - description: 游戏模板 ID
        in: path
        name: id
        required: true
        type: string
      - description: 词条 ID
        in: path
        name: eid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除世界书词条
      tags:
      - creation-lorebook
  /create/templates/{id}/lorebook/import-st:
    post:
      consumes:
      - application/json
      description: 导入 SillyTavern 世界书 JSON，批量写入 WorldbookEntry
      parameters:
      - description: 游戏模板 ID
        in: path
        name: id
        required: true
        type: string
      - description: ST worldbook JSON
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
